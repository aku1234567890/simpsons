<html>
    <head>
        <title>Simpsons sivusto</title>
        <link rel="stylesheet" href="style.css">
    </head>

            <img src="../The_Simpsons_yellow_logo.svg" width="128" height="128">

        <nav>

        <main>

        document.getElementById("back").innerHTML = `<a href="${j}">&lt; Back</a>`;
