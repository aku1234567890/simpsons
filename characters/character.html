<html>
    <head>
        <title>Simpsons sivusto</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <style>
        /* Style the tab */
.tab {
  overflow: hidden;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
  width: 150px;
}

/* Style the buttons inside the tab */
.tab button {
  background-color: inherit;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  transition: 0.3s;
  font-size: 17px;
}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current tablink class */
.tab button.active {
  background-color: #ccc;
}

/* Style the tab content */
.tabcontent {
  display: none;
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-top: none;
}
    </style>
    <body>
        <header>
            <a href="/">
            <img src="../The_Simpsons_yellow_logo.svg" width="128" height="128">
            </a>
            <h1>The Simpsons Page</h1>
        </header>
        <nav>
            <a href="/springfield">Springfield</a>
            <a href="/characters">Characters</a>
            <a href="/forum.html">Forum</a>
        </nav>
        <main>
            <aside>
                <img id="characterImage" style="margin:0; height: 30rem; max-width: 18rem;">
            </aside>
            <section>
                <div class="tab">
                <button class="tablinks active" onclick="tab(event, 'info')">Info</button>
                <button class="tablinks" onclick="tab(event, 'memes')">Memes</button>
                </div>

                <div id="info" class="tabcontent" style="display: block;">
                <h2 id="fullName"></h2>
                <p id="desc"></p>
                <audio controls id="audio"></audio>
                <br>
                <img id="actor" width="96" height="96">
                <a id="actorLink"><p id="actorName"></p></a>
                </div>

                <div id="memes" class="tabcontent">
                <img id="meme1" height="192" width="192" onclick="swell('meme1')">
                <img id="meme2" height="192" width="192" onclick="swell('meme2')">
                <img id="meme3" height="192" width="192" onclick="swell('meme3')">
                <img id="meme4" height="192" width="192" onclick="swell('meme4')">
                <img id="meme5" height="192" width="192" onclick="swell('meme5')">
                </div>
            </section>
        </main>
        
    </body>
    <script>
        let swelled = false;
        function swell(i) {
            if (swelled == false) {
                document.getElementById(i).style.height = "1024px";
                document.getElementById(i).style.width = "1024px";
                swelled = true
            } else {
                document.getElementById(i).style.height = "192px";
                document.getElementById(i).style.width = "192px";
                swelled = false
            }
        }

        function tab(evt, c) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(c).style.display = "block";
            evt.currentTarget.className += " active";
        }


        let params = new URLSearchParams(document.location.search);
        let i = params.get("character")
        fetch("characters.json")
        .then(resp => resp.json())
        .then(data => {
            console.log(data)
            document.getElementById("characterImage").src = data[i].picture
            document.getElementById("fullName").innerHTML = data[i].name
            document.getElementById("desc").innerHTML = data[i].description
            document.getElementById("audio").src = data[i].characterVoice
            document.getElementById("actorName").innerHTML = data[i].actorName
            document.getElementById("actor").src = data[i].actorPicture
            document.getElementById("actorLink").href = data[i].actorLink
            document.getElementById("meme1").src = data[i].meme1
            document.getElementById("meme2").src = data[i].meme2
            document.getElementById("meme3").src = data[i].meme3
            document.getElementById("meme4").src = data[i].meme4
            document.getElementById("meme5").src = data[i].meme5
        })
        .catch(error => console.error(error))
    </script>
</html>
